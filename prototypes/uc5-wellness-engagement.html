<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pager — Wellness Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#e8eef5,#f5f7fb,#ebf0f9);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* iPhone Frame */
.phone{width:390px;height:844px;background:#fff;border-radius:50px;box-shadow:0 24px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.04);overflow:hidden;display:flex;flex-direction:column;position:relative}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:34px;background:#000;border-radius:0 0 20px 20px;z-index:50}
.status-bar{height:54px;background:#1a3a4a;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;z-index:40;flex-shrink:0}
.status-bar .time{color:white;font-size:15px;font-weight:600}
.status-bar .icons{display:flex;gap:4px;align-items:center;color:white;font-size:12px}
.status-bar .icons span{font-weight:600}

/* Header */
.chat-header{background:#1a3a4a;padding:10px 20px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-header .back{color:white;font-size:22px;font-weight:300;cursor:pointer;line-height:1}
.chat-header h1{color:white;font-size:17px;font-weight:600;flex:1;text-align:center;margin-right:22px}

/* Chat Area */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff}
.chat-body::-webkit-scrollbar{width:0}

/* Timestamp */
.timestamp{text-align:center;font-size:11px;color:#8a9baa;padding:4px 0}

/* Messages */
.msg{display:flex;gap:8px;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:white;font-family:Georgia,serif}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;max-width:100%}
.msg.bot .bub{background:#f0f2f5;color:#1a2332;border-bottom-left-radius:4px}
.msg.user .bub{background:#1a3a4a;color:white;border-bottom-right-radius:4px}

/* Typing */
.typing{display:flex;gap:8px;align-self:flex-start;opacity:0;animation:msgIn .35s ease forwards}
.typing .dots{display:flex;gap:4px;padding:12px 16px;background:#f0f2f5;border-radius:18px;border-bottom-left-radius:4px}
.typing .dots span{width:6px;height:6px;background:#8a9baa;border-radius:50%;animation:bounce 1.2s infinite}
.typing .dots span:nth-child(2){animation-delay:.15s}
.typing .dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Suggested Actions */
.actions{display:flex;flex-direction:column;gap:8px;align-self:flex-end;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.action-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#1a3a4a;color:white;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;align-self:flex-end}
.action-btn .icon{font-size:12px;opacity:0.7}

/* Schedule Card */
.schedule-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.schedule-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.day-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.day-chip{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.day-chip.selected{background:#1a3a4a;color:white}
.time-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.time-chip{padding:8px 16px;border-radius:12px;font-size:12px;font-weight:500;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.time-chip.selected{background:#1a3a4a;color:white}
.find-times-btn{width:100%;padding:10px;border-radius:12px;background:#1a3a4a;color:white;font-size:13px;font-weight:600;text-align:center;border:none;font-family:'Inter',sans-serif;cursor:pointer}

/* GenUI Cards */
.card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);max-width:100%;align-self:flex-start}
.card-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;padding:14px 16px 0}

/* Assessment Card */
.assess-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.assess-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.assess-title{font-size:16px;font-weight:700;color:#1a2332;margin-bottom:6px}
.assess-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#fff3e0;color:#e67e22;margin-bottom:12px}
.assess-section{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 8px}
.assess-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:#1a2332}
.assess-check{width:20px;height:20px;border-radius:50%;background:#27ae60;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;flex-shrink:0}

/* Provider Card */
.provider-card{background:white;border:2px solid #e8ecf0;border-radius:16px;padding:14px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;position:relative}
.provider-card.selected{border-color:#1a3a4a}
.provider-top{display:flex;gap:10px;align-items:flex-start}
.provider-photo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a3a4a,#2d6b7a);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:600;flex-shrink:0}
.provider-info{flex:1}
.provider-name{font-size:15px;font-weight:700;color:#1a2332}
.provider-spec{font-size:12px;color:#5a6b7b;margin-top:1px}
.provider-rating{display:flex;align-items:center;gap:4px;margin-top:4px}
.stars{color:#e67e22;font-size:12px}
.rating-num{font-size:13px;font-weight:600;color:#1a2332}
.rating-count{font-size:11px;color:#8a9baa}
.tier-badge{font-size:11px;font-weight:600;color:#27ae60;margin-left:auto}
.provider-check{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
.provider-check-toggle{width:28px;height:28px;border-radius:50%;border:2px solid #c8d0d8;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;cursor:pointer;transition:all .2s;position:absolute;top:12px;right:12px}
.provider-check-toggle.selected{background:#1a3a4a;border-color:#1a3a4a;color:white}
.provider-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.provider-meta span{font-size:11px;color:#5a6b7b}

/* Filter Tabs */
.filter-tabs{display:flex;gap:8px;padding:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start}
.filter-tab{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.filter-tab.active{background:#1a3a4a;color:white}

/* Time Slots */
.slots{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.slot{padding:6px 12px;border-radius:12px;font-size:12px;font-weight:500;background:#f0f2f5;color:#5a6b7b;cursor:pointer;transition:all .2s}
.slot:hover{background:#e0e4e8}
.slot.selected{background:#1a3a4a;color:white}

/* Input Bar */
.input-bar{padding:10px 16px 28px;background:#fff;border-top:1px solid #f0f2f5;display:flex;align-items:center;gap:8px;flex-shrink:0}
.input-field{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #e0e4e8;font-size:14px;color:#8a9baa;background:#f8f9fb;font-family:'Inter',sans-serif}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a3a4a;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn svg{width:16px;height:16px;fill:white}

/* Start Overlay */
.start-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:flex;align-items:center;justify-content:center;z-index:60;border-radius:50px}
.start-overlay.hidden{display:none}
.start-content{text-align:center;padding:40px}
.start-content h2{font-size:22px;color:#1a2332;margin-bottom:6px;font-weight:700}
.start-content p{font-size:13px;color:#5a6b7b;margin-bottom:20px;line-height:1.5}
.start-btn{padding:14px 36px;background:#1a3a4a;color:white;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .2s}
.start-btn:hover{transform:scale(1.04)}

/* UC label */
.uc-badge{display:inline-block;background:#1a3a4a;color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:10px;margin-bottom:10px;letter-spacing:0.5px}

/* Wellness Score Card */
.wellness-card{background:linear-gradient(135deg,#1a3a4a,#2d6b7a);border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;color:white}
.wellness-score{font-size:48px;font-weight:700;text-align:center;margin:8px 0}
.wellness-label{text-align:center;font-size:12px;opacity:0.7;margin-bottom:12px}
.wellness-bar{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:12px}
.wellness-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#e67e22,#27ae60)}
.wellness-items{display:flex;flex-direction:column;gap:6px}
.wellness-item{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
.wellness-item .done{color:#27ae60;font-weight:600}
.wellness-item .pending{color:#e67e22;font-weight:600}

/* Screening Card */
.screening-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.screening-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eef2f5}
.screening-row:last-child{border-bottom:none}
.screening-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.screening-icon.urgent{background:#fde8e8;color:#c0392b}
.screening-icon.soon{background:#fff3e0;color:#e67e22}
.screening-icon.ok{background:#e8f8f0;color:#27ae60}
.screening-info{flex:1}
.screening-name{font-size:13px;font-weight:600;color:#1a2332}
.screening-detail{font-size:11px;color:#8a9baa}
.screening-status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px}
.screening-status.overdue{background:#fde8e8;color:#c0392b}
.screening-status.due{background:#fff3e0;color:#e67e22}
.screening-status.complete{background:#e8f8f0;color:#27ae60}

/* Loading State */
.loading-state{display:flex;align-items:center;gap:8px;padding:8px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;font-size:13px;color:#8a9baa}
.loading-state .spinner{width:16px;height:16px;border:2px solid #e8ecf0;border-top:2px solid #1a3a4a;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Enrollment Success Card */
.enroll-card{background:linear-gradient(135deg,#1a3a4a,#2d6b7a);border-radius:16px;padding:20px 16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;color:white;text-align:center}
.enroll-emoji{font-size:32px;margin-bottom:6px}
.enroll-title{font-size:18px;font-weight:700;margin-bottom:4px}
.enroll-subtitle{font-size:12px;opacity:0.7;margin-bottom:12px}
.enroll-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.enroll-chip{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;background:rgba(255,255,255,0.15);color:white}
.enroll-text{font-size:12px;opacity:0.8;line-height:1.4}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:00</span>
    <span class="icons"><span>5G</span> <span>&#9679;</span></span>
  </div>
  <div class="chat-header">
    <span class="back">&#8249;</span>
    <h1>ARIA Health Companion</h1>
  </div>
  <div class="chat-body" id="chat"></div>
  <div class="input-bar">
    <input class="input-field" placeholder="Type a message..." readonly>
    <button class="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <div class="uc-badge">USE CASE 5</div>
      <h2>Wellness Engagement</h2>
      <p>Proactive outreach-first wellness — personalized nudges, screening scheduling, home test kits, and rewards tracking.</p>
      <button class="start-btn" onclick="startDemo()">Start Demo</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');

function sb() { chat.scrollTop = chat.scrollHeight; }

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addEl(html, cls = '') {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.innerHTML = html;
  d.style.animation = 'none';
  chat.appendChild(d);
  d.offsetHeight;
  d.style.animation = '';
  sb();
  return d;
}

function botMsg(text) {
  return addEl(`<div class="avatar">A</div><div class="bub">${text}</div>`, 'msg bot');
}

function userMsg(text) {
  return addEl(`<div class="bub">${text}</div>`, 'msg user');
}

function actionBtn(text){return new Promise(resolve=>{const hint=addEl('<div style="text-align:center;font-size:12px;color:#b0bcc8;padding:8px 0;cursor:pointer">Tap to continue&hellip;</div>','tap-hint');const handler=(e)=>{if(e.target.closest('.schedule-card,.symptom-card,.provider-card'))return;hint.remove();chat.removeEventListener('click',handler);userMsg(text);resolve(text)};chat.addEventListener('click',handler)})}

function addLoading(text) {
  return addEl(`<div class="spinner"></div> ${text}`, 'loading-state');
}

async function typing(ms = 1200) {
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = `<div class="avatar">A</div><div class="dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(d); sb();
  await wait(ms);
  d.remove();
}

async function startDemo() {
  document.getElementById('startOverlay').classList.add('hidden');

  // 1. Timestamp
  addEl('Today 9:00 AM', 'timestamp');

  // Bot: greeting about preventive care
  await typing(1000);
  botMsg("Good morning Lisa! &#127807; This is ARIA, your health companion. It's a great time to check in on your preventive care. Did you know you have a few screenings coming up that can help you stay ahead?");

  // 4. USER CLICK: "What do I need?"
  await actionBtn("What do I need?");

  // 4. Loading: "Pulling your wellness data..."
  await typing(1000);
  botMsg("No worries — let me show you where you stand:");
  await wait(600);
  const loader1 = addLoading('Pulling your wellness data ...');
  await wait(1800);
  loader1.remove();

  // 5. Wellness score card (64/100 gradient card)
  addEl(`
    <div class="wellness-score">64</div>
    <div class="wellness-label">Wellness Score &middot; out of 100</div>
    <div class="wellness-bar"><div class="wellness-fill" style="width:64%"></div></div>
    <div class="wellness-items">
      <div class="wellness-item"><span>Annual Physical</span><span class="done">Complete &#10003;</span></div>
      <div class="wellness-item"><span>Mammogram</span><span class="pending">Due this month</span></div>
      <div class="wellness-item"><span>Colorectal Screening</span><span class="pending">Overdue</span></div>
      <div class="wellness-item"><span>Flu Vaccine</span><span class="done">Complete &#10003;</span></div>
      <div class="wellness-item"><span>Dental Check</span><span class="pending">Due in 2 months</span></div>
    </div>
  `, 'wellness-card');

  // 6. Bot: explains score
  await wait(800);
  await typing(1200);
  botMsg("You're at 64 out of 100 — completing your overdue screenings would bump you to 88. Here's the breakdown:");

  // 7. Loading: "Checking screening records..."
  await wait(600);
  const loader2 = addLoading('Checking screening records ...');
  await wait(1800);
  loader2.remove();

  // 8. Screening details card (with urgency icons)
  addEl(`
    <div class="assess-label">PREVENTIVE SCREENINGS</div>
    <div class="screening-row">
      <div class="screening-icon urgent">&#128308;</div>
      <div class="screening-info">
        <div class="screening-name">Colorectal Screening</div>
        <div class="screening-detail">Overdue by 3 months</div>
      </div>
      <span class="screening-status overdue">OVERDUE</span>
    </div>
    <div class="screening-row">
      <div class="screening-icon soon">&#128992;</div>
      <div class="screening-info">
        <div class="screening-name">Mammogram</div>
        <div class="screening-detail">Due by Apr 30</div>
      </div>
      <span class="screening-status due">DUE</span>
    </div>
    <div class="screening-row">
      <div class="screening-icon ok">&#128994;</div>
      <div class="screening-info">
        <div class="screening-name">Annual Physical</div>
        <div class="screening-detail">Completed Jan 15</div>
      </div>
      <span class="screening-status complete">COMPLETE</span>
    </div>
    <div class="screening-row">
      <div class="screening-icon ok">&#128994;</div>
      <div class="screening-info">
        <div class="screening-name">Flu Vaccine</div>
        <div class="screening-detail">Completed Oct 2025</div>
      </div>
      <span class="screening-status complete">COMPLETE</span>
    </div>
  `, 'screening-card');

  // 9. Bot: recommends Cologuard home kit
  await wait(800);
  await typing(1400);
  botMsg("The colorectal screening is the priority — you're 3 months overdue. The good news? You can do a Cologuard home test kit, no prep or office visit needed. Want me to order one?");

  // 10. USER CLICK: "Yes, order the home kit"
  await actionBtn("Yes, order the home kit");

  // 11. Bot: confirms kit ordered, moves to mammogram
  await typing(1400);
  botMsg("Cologuard kit ordered — it'll arrive at your home in 3-5 business days with instructions. Now let's tackle that mammogram.");
  await wait(600);
  await typing(1000);
  botMsg("Here are the top-rated imaging centers near you:");

  // 12. Provider 1 with toggleable checkmark (Providence — pre-selected)
  await wait(600);
  const provCard1 = addEl(`
    <div class="provider-check-toggle selected" data-provider="providence">&#10003;</div>
    <div class="provider-top">
      <div class="provider-photo">PB</div>
      <div class="provider-info">
        <div class="provider-name">Providence Breast Health Center</div>
        <div class="provider-spec">Imaging &middot; Mammography</div>
        <div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="rating-num">4.8</span><span class="rating-count">(312)</span><span class="tier-badge">Tier 1 In-Network</span></div>
      </div>
    </div>
    <div class="provider-meta"><span>&#128205; 1.9 miles</span><span>&#128176; $0 copay (preventive)</span></div>
  `, 'provider-card selected');

  // 13. Provider 2 with toggleable checkmark (OHSU — not selected)
  await wait(400);
  const provCard2 = addEl(`
    <div class="provider-check-toggle" data-provider="ohsu">&#10003;</div>
    <div class="provider-top">
      <div class="provider-photo" style="background:linear-gradient(135deg,#2d6b7a,#4a9aab)">OI</div>
      <div class="provider-info">
        <div class="provider-name">OHSU Imaging Center</div>
        <div class="provider-spec">Imaging &middot; Mammography</div>
        <div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9734;</span><span class="rating-num">4.7</span><span class="rating-count">(245)</span><span class="tier-badge">Tier 1 In-Network</span></div>
      </div>
    </div>
    <div class="provider-meta"><span>&#128205; 4.1 miles</span><span>&#128176; $0 copay</span></div>
  `, 'provider-card');

  // Wire up toggleable checkmarks
  [provCard1, provCard2].forEach(card => {
    const toggle = card.querySelector('.provider-check-toggle');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('selected');
      card.classList.toggle('selected', toggle.classList.contains('selected'));
    });
  });

  // 14. USER CLICK: "Find available appointments"
  await actionBtn("Find available appointments");

  // 15. Bot: day/time picker
  await typing(1000);
  botMsg("What days and times work best for you?");

  // 16. Day/time picker card
  await wait(400);
  const schedCard = addEl(`
    <div class="schedule-label">DAYS</div>
    <div class="day-chips">
      <span class="day-chip" data-day>Mon</span><span class="day-chip" data-day>Tue</span><span class="day-chip" data-day>Wed</span><span class="day-chip selected" data-day>Thu</span><span class="day-chip" data-day>Fri</span><span class="day-chip" data-day>Sat</span><span class="day-chip" data-day>Sun</span>
    </div>
    <div class="schedule-label">TIME OF DAY</div>
    <div class="time-chips">
      <span class="time-chip" data-time>Morning</span><span class="time-chip selected" data-time>Afternoon</span><span class="time-chip" data-time>Evening</span>
    </div>
    <button class="find-times-btn" id="findTimesBtn">Find Available Times &rarr;</button>
  `, 'schedule-card');
  schedCard.querySelectorAll('[data-day]').forEach(d => { d.addEventListener('click', () => d.classList.toggle('selected')); });
  schedCard.querySelectorAll('[data-time]').forEach(t => { t.addEventListener('click', () => { schedCard.querySelectorAll('[data-time]').forEach(x => x.classList.remove('selected')); t.classList.add('selected'); }); });
  await new Promise(resolve => { document.getElementById('findTimesBtn').addEventListener('click', resolve); });
  schedCard.style.pointerEvents='none'; schedCard.style.opacity='0.85';

  // 17. Async calling
  await typing(1200);
  botMsg("Perfect. Let me call their offices to check availability. I'll text you in about 10&ndash;15 minutes once I have some options for you.");

  // 18. USER CLICK: "I'll wait for the message"
  await actionBtn("I'll wait for the message");

  // 19. Time skip
  await wait(800);
  addEl('Today 9:17 AM', 'timestamp');

  // 20. Bot returns with availability
  await typing(1400);
  botMsg("I heard back from the offices. Here's what's available this week. Go ahead and pick a time that works for you.");

  // 21. Per-provider availability cards with clickable time slot pills
  await wait(600);
  const availCard1 = addEl(`
    <div class="provider-top">
      <div class="provider-photo">PB</div>
      <div class="provider-info">
        <div class="provider-name">Providence Breast Health Center</div>
        <div class="provider-spec">Imaging &middot; Mammography</div>
      </div>
    </div>
    <div class="slots" style="margin-top:10px">
      <span class="slot" data-slot="Apr 10 &middot; 8:30 AM">Apr 10 &middot; 8:30 AM</span>
      <span class="slot" data-slot="Apr 12 &middot; 10:00 AM">Apr 12 &middot; 10:00 AM</span>
      <span class="slot" data-slot="Apr 14 &middot; 2:15 PM">Apr 14 &middot; 2:15 PM</span>
    </div>
  `, 'provider-card');

  await wait(400);
  const availCard2 = addEl(`
    <div class="provider-top">
      <div class="provider-photo" style="background:linear-gradient(135deg,#2d6b7a,#4a9aab)">OI</div>
      <div class="provider-info">
        <div class="provider-name">OHSU Imaging Center</div>
        <div class="provider-spec">Imaging &middot; Mammography</div>
      </div>
    </div>
    <div class="slots" style="margin-top:10px">
      <span class="slot" data-slot="Apr 11 &middot; 9:00 AM">Apr 11 &middot; 9:00 AM</span>
      <span class="slot" data-slot="Apr 13 &middot; 1:30 PM">Apr 13 &middot; 1:30 PM</span>
      <span class="slot" data-slot="Apr 15 &middot; 11:00 AM">Apr 15 &middot; 11:00 AM</span>
    </div>
  `, 'provider-card');

  // 22. Collect slot clicks across both provider cards
  const allSlots = chat.querySelectorAll('[data-slot]');
  const selectedSlot = await new Promise(resolve => {
    allSlots.forEach(slot => {
      slot.style.cursor = 'pointer';
      slot.addEventListener('click', () => {
        allSlots.forEach(s => s.classList.remove('selected'));
        slot.classList.add('selected');
        resolve(slot.getAttribute('data-slot'));
      });
    });
  });
  availCard1.style.pointerEvents = 'none';
  availCard2.style.pointerEvents = 'none';
  await wait(300);

  // 23. USER CLICK: "Request this appointment"
  await actionBtn("Request this appointment");

  // 24. Async confirmation
  await typing(1200);
  botMsg("Perfect, I'll call the office and book the appointment and send you a text when it's confirmed.");

  // 17. Bot: mentions rewards
  await typing(1400);
  botMsg("Booked! One more thing — completing these screenings earns you rewards through your wellness program:");

  // 18. Rewards card
  await wait(600);
  addEl(`
    <div class="assess-label">WELLNESS REWARDS</div>
    <div class="assess-title">$75 in Rewards Available</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Colorectal screening — $25 reward</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Mammogram — $25 reward</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Complete wellness profile — $25 reward</div>
  `, 'assess-card');

  // 19. USER CLICK: "Tell me about the wellness profile"
  await actionBtn("Tell me about the wellness profile");

  // 20. Bot: explains wellness profile
  await typing(1400);
  botMsg("It's a quick online health assessment — takes about 5 minutes. You'll get personalized health insights plus the $25 reward. Want me to send you the link?");

  // 21. USER CLICK: "Yes, send me the link"
  await actionBtn("Yes, send me the link");

  // 22. Enrollment card (Wellness Rewards)
  await typing(1000);
  addEl(`
    <div class="enroll-emoji">&#127881;</div>
    <div class="enroll-title">Enrolled in Wellness Rewards</div>
    <div class="enroll-subtitle">Your personalized wellness program is active</div>
    <div class="enroll-chips">
      <span class="enroll-chip">Screenings</span>
      <span class="enroll-chip">Rewards</span>
      <span class="enroll-chip">Health Profile</span>
    </div>
    <div class="enroll-text">Complete your actions to earn up to $75 in rewards. We'll keep you on track with reminders.</div>
  `, 'enroll-card');

  // 23. Confirmation card (3 actions, projected score 64 -> 88)
  await wait(600);
  addEl(`
    <div class="assess-label">WELLNESS PLAN</div>
    <div class="assess-title">3 Actions Scheduled</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Cologuard Kit — Shipping in 3-5 days</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Mammogram — ${selectedSlot} at Providence</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Health Assessment — Link sent via text</div>
    <div style="text-align:center;margin-top:12px;font-size:14px;font-weight:700;color:#1a2332">Projected Score: <span style="color:#8a9baa">64</span> <span style="color:#8a9baa">&rarr;</span> <span style="color:#27ae60">88</span></div>
  `, 'assess-card');

  // 24. Bot: closing message
  await wait(600);
  await typing(1200);
  botMsg("You're taking great steps for your health! I'll send reminders before each appointment and follow up when the Cologuard kit arrives. Here's to hitting 88! &#128154;");
}
</script>
</body>
</html>
