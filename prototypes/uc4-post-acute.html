<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pager — Post-Acute Follow-Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#e8eef5,#f5f7fb,#ebf0f9);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* iPhone Frame */
.phone{width:390px;height:844px;background:#fff;border-radius:50px;box-shadow:0 24px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.04);overflow:hidden;display:flex;flex-direction:column;position:relative}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:34px;background:#000;border-radius:0 0 20px 20px;z-index:50}
.status-bar{height:54px;background:#1a3a4a;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;z-index:40;flex-shrink:0}
.status-bar .time{color:white;font-size:15px;font-weight:600}
.status-bar .icons{display:flex;gap:4px;align-items:center;color:white;font-size:12px}
.status-bar .icons span{font-weight:600}

/* Header */
.chat-header{background:#1a3a4a;padding:10px 20px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-header .back{color:white;font-size:22px;font-weight:300;cursor:pointer;line-height:1}
.chat-header h1{color:white;font-size:17px;font-weight:600;flex:1;text-align:center;margin-right:22px}

/* Chat Area */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff}
.chat-body::-webkit-scrollbar{width:0}

/* Timestamp */
.timestamp{text-align:center;font-size:11px;color:#8a9baa;padding:4px 0}

/* Messages */
.msg{display:flex;gap:8px;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:white;font-family:Georgia,serif}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;max-width:100%}
.msg.bot .bub{background:#f0f2f5;color:#1a2332;border-bottom-left-radius:4px}
.msg.user .bub{background:#1a3a4a;color:white;border-bottom-right-radius:4px}

/* Typing */
.typing{display:flex;gap:8px;align-self:flex-start;opacity:0;animation:msgIn .35s ease forwards}
.typing .dots{display:flex;gap:4px;padding:12px 16px;background:#f0f2f5;border-radius:18px;border-bottom-left-radius:4px}
.typing .dots span{width:6px;height:6px;background:#8a9baa;border-radius:50%;animation:bounce 1.2s infinite}
.typing .dots span:nth-child(2){animation-delay:.15s}
.typing .dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Suggested Actions */
.actions{display:flex;flex-direction:column;gap:8px;align-self:flex-end;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.action-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#1a3a4a;color:white;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;align-self:flex-end}
.action-btn .icon{font-size:12px;opacity:0.7}

/* GenUI Cards */
/* Schedule Card */
.schedule-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.schedule-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.day-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.day-chip{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.day-chip.selected{background:#1a3a4a;color:white}
.time-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.time-chip{padding:8px 16px;border-radius:12px;font-size:12px;font-weight:500;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.time-chip.selected{background:#1a3a4a;color:white}
.find-times-btn{width:100%;padding:10px;border-radius:12px;background:#1a3a4a;color:white;font-size:13px;font-weight:600;text-align:center;border:none;font-family:'Inter',sans-serif;cursor:pointer}

.card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);max-width:100%;align-self:flex-start}
.card-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;padding:14px 16px 0}

/* Pain Level Card */
.pain-card{background:#1a3a4a;border-radius:16px;padding:16px;color:white;margin:4px 0;align-self:flex-end;max-width:70%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.pain-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:rgba(255,255,255,0.6);margin-bottom:8px}
.pain-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pain-badge{background:#e67e22;color:white;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.pain-num{font-size:36px;font-weight:700}
.pain-dots{display:flex;gap:4px}
.pain-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2)}
.pain-dots .dot.active{background:#e67e22}
.pain-dots .dot.current{background:#e67e22;box-shadow:0 0 6px rgba(230,126,34,0.5)}

/* Symptom Chips */
.symptom-card{background:#1a3a4a;border-radius:16px;padding:14px 16px;align-self:flex-end;max-width:75%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.symptom-card .card-label{color:rgba(255,255,255,0.6);padding:0 0 8px}
.symptom-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)}
.chip.selected{background:white;color:#1a3a4a;font-weight:600}

/* Assessment Card */
.assess-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.assess-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.assess-title{font-size:16px;font-weight:700;color:#1a2332;margin-bottom:6px}
.assess-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#fff3e0;color:#e67e22;margin-bottom:12px}
.assess-section{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 8px}
.assess-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:#1a2332}
.assess-check{width:20px;height:20px;border-radius:50%;background:#27ae60;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;flex-shrink:0}
.calc-time{text-align:center;font-size:11px;color:#8a9baa;margin-top:8px}

/* Provider Card */
.provider-card{background:white;border:2px solid #e8ecf0;border-radius:16px;padding:14px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;position:relative}
.provider-card.selected{border-color:#1a3a4a}
.provider-top{display:flex;gap:10px;align-items:flex-start}
.provider-photo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a3a4a,#2d6b7a);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:600;flex-shrink:0}
.provider-info{flex:1}
.provider-name{font-size:15px;font-weight:700;color:#1a2332}
.provider-spec{font-size:12px;color:#5a6b7b;margin-top:1px}
.provider-rating{display:flex;align-items:center;gap:4px;margin-top:4px}
.stars{color:#e67e22;font-size:12px}
.rating-num{font-size:13px;font-weight:600;color:#1a2332}
.rating-count{font-size:11px;color:#8a9baa}
.tier-badge{font-size:11px;font-weight:600;color:#27ae60;margin-left:auto}
.provider-check{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
.provider-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.provider-meta span{font-size:11px;color:#5a6b7b}
.provider-desc{font-size:12px;color:#5a6b7b;margin-top:8px;line-height:1.4}

/* Filter Tabs */
.filter-tabs{display:flex;gap:8px;padding:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start}
.filter-tab{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.filter-tab.active{background:#1a3a4a;color:white}

/* Time Slots */
.slots{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.slot{padding:6px 12px;border-radius:12px;font-size:12px;font-weight:500;background:#f0f2f5;color:#5a6b7b}
.slot.selected{background:#1a3a4a;color:white}

/* Nurse Card */
.nurse-card{border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.nurse-header{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:16px;display:flex;align-items:center;gap:12px}
.nurse-photo{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,0.5)}
.nurse-name{color:white;font-size:16px;font-weight:700}
.nurse-org{display:inline-block;background:rgba(255,255,255,0.25);color:white;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500;margin-top:2px}
.nurse-body{background:white;border:1px solid #e8ecf0;border-top:none;padding:14px 16px;font-size:13px;color:#3a4a5a;line-height:1.5}
.nurse-creds{margin-top:8px;font-size:13px}
.nurse-creds span{display:flex;align-items:center;gap:6px;padding:2px 0}

/* Cost Card */
.cost-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eef2f5;font-size:13px}
.cost-row:last-child{border-bottom:none}
.cost-label{color:#5a6b7b}
.cost-val{font-weight:600;color:#1a2332}

/* Safety Card */
.safety-card{background:#fff8f0;border:1px solid #fde0b0;border-radius:16px;padding:14px 16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.safety-card h5{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:8px}
.safety-item{font-size:12px;color:#5a3a1a;padding:3px 0}

/* Input Bar */
.input-bar{padding:10px 16px 28px;background:#fff;border-top:1px solid #f0f2f5;display:flex;align-items:center;gap:8px;flex-shrink:0}
.input-field{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #e0e4e8;font-size:14px;color:#8a9baa;background:#f8f9fb;font-family:'Inter',sans-serif}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a3a4a;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn svg{width:16px;height:16px;fill:white}

/* Start Overlay */
.start-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:flex;align-items:center;justify-content:center;z-index:60;border-radius:50px}
.start-overlay.hidden{display:none}
.start-content{text-align:center;padding:40px}
.start-content h2{font-size:22px;color:#1a2332;margin-bottom:6px;font-weight:700}
.start-content p{font-size:13px;color:#5a6b7b;margin-bottom:20px;line-height:1.5}
.start-btn{padding:14px 36px;background:#1a3a4a;color:white;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .2s}
.start-btn:hover{transform:scale(1.04)}

/* UC label */
.uc-badge{display:inline-block;background:#1a3a4a;color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:10px;margin-bottom:10px;letter-spacing:0.5px}

/* Discharge Card */
.discharge-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.discharge-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.discharge-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e67e22,#f39c12);display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
.discharge-title{font-size:14px;font-weight:700;color:#1a2332}
.discharge-date{font-size:11px;color:#8a9baa}
/* Checklist */
.checklist{margin-top:8px}
.check-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:#1a2332}
.check-box{width:20px;height:20px;border-radius:6px;border:2px solid #e0e4e8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-box.done{background:#27ae60;border-color:#27ae60;color:white;font-size:11px}
.check-box.missed{background:#c0392b;border-color:#c0392b;color:white;font-size:11px}
/* Alert Banner */
.alert-banner{background:linear-gradient(135deg,#e67e22,#f39c12);border-radius:16px;padding:14px 16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;color:white}
.alert-banner h5{font-size:13px;font-weight:700;margin-bottom:4px}
.alert-banner p{font-size:12px;opacity:0.9;line-height:1.4}

/* Loading State */
.loading-state{display:flex;align-items:center;gap:8px;padding:8px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;font-size:13px;color:#8a9baa}
.loading-state .spinner{width:16px;height:16px;border:2px solid #e8ecf0;border-top:2px solid #1a3a4a;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.provider-check-toggle{width:28px;height:28px;border-radius:50%;border:2px solid #c8d0d8;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;cursor:pointer;transition:all .2s;position:absolute;top:12px;right:12px}
.provider-check-toggle.selected{background:#1a3a4a;border-color:#1a3a4a;color:white}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time">11:30</span>
    <span class="icons"><span>5G</span> <span>&#9679;</span></span>
  </div>
  <div class="chat-header">
    <span class="back">&#8249;</span>
    <h1>ARIA Health Companion</h1>
  </div>
  <div class="chat-body" id="chat"></div>
  <div class="input-bar">
    <input class="input-field" placeholder="Type a message..." readonly>
    <button class="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <div class="uc-badge">USE CASE 4</div>
      <h2>Post-Acute Follow-Up</h2>
      <p>ADT-triggered outreach within 24 hours of discharge &mdash; medication verification, follow-up scheduling, and 30-day monitoring.</p>
      <button class="start-btn" onclick="startDemo()">Start Demo</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
function sb() { chat.scrollTop = chat.scrollHeight; }
function addEl(html, cls) {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.innerHTML = html;
  d.style.animation = 'none';
  chat.appendChild(d);
  d.offsetHeight;
  d.style.animation = '';
  sb();
  return d;
}
function addTyping() { const d = document.createElement('div'); d.className = 'typing'; d.id = 'typing'; d.innerHTML = '<div class="avatar">A</div><div class="dots"><span></span><span></span><span></span></div>'; chat.appendChild(d); sb(); }
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function botMsg(text) { removeTyping(); return addEl('<div class="avatar">A</div><div class="bub">' + text + '</div>', 'msg bot'); }
function userMsg(text) { return addEl('<div class="bub">' + text + '</div>', 'msg user'); }
function actionBtn(text){return new Promise(resolve=>{const hint=addEl('<div style="text-align:center;font-size:12px;color:#b0bcc8;padding:8px 0;cursor:pointer">Tap to continue&hellip;</div>','tap-hint');const handler=(e)=>{if(e.target.closest('.schedule-card,.symptom-card,.provider-card'))return;hint.remove();chat.removeEventListener('click',handler);userMsg(text);resolve(text)};chat.addEventListener('click',handler)})}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
async function typing(ms) { addTyping(); await wait(ms); removeTyping(); }
function addLoading(text) { return addEl('<div class="spinner"></div> ' + text, 'loading-state'); }

async function runDemo() {
  // 1. Timestamp
  addEl('Today 11:30 AM', 'timestamp');

  // ADT alert banner
  addEl('<h5>&#9888; ADT ALERT</h5><p>Robert Martinez discharged from Providence Portland Medical Center &mdash; Hip Replacement (ICD-10: Z96.641). Follow-up protocol initiated.</p>', 'alert-banner');
  await wait(600);

  // 4. Bot greeting
  await typing(1500);
  botMsg("Hi Robert, this is ARIA, your health companion. I see you were discharged yesterday from Providence Portland after your hip replacement. How are you doing at home?");

  // 5. USER CLICK: "I'm doing okay but pretty sore"
  await actionBtn("I'm doing okay but pretty sore");

  // 5. Bot reviews discharge plan
  await typing(1500);
  botMsg("That's completely normal after a procedure like this. Let me review your discharge plan:");

  // 5b. Loading: pulling discharge records
  var loader = addLoading('Pulling in discharge records ...');
  await wait(1500);
  loader.remove();

  // 6. Discharge card with checklist
  addEl(
    '<div class="discharge-header"><div class="discharge-icon">&#128203;</div><div><div class="discharge-title">Discharge Summary</div><div class="discharge-date">Discharged Mar 29, 2026</div></div></div>' +
    '<div class="checklist">' +
    '<div class="check-item"><div class="check-box done">&#10003;</div>Pain management protocol received</div>' +
    '<div class="check-item"><div class="check-box done">&#10003;</div>Physical therapy referral placed</div>' +
    '<div class="check-item"><div class="check-box missed">&#10007;</div>Follow-up with orthopedic surgeon &mdash; <strong>NOT YET SCHEDULED</strong></div>' +
    '<div class="check-item"><div class="check-box missed">&#10007;</div>Prescription pickup &mdash; <strong>NOT CONFIRMED</strong></div>' +
    '</div>',
    'discharge-card'
  );

  // 7. Bot checks prescriptions, shows medication list
  await wait(800);
  botMsg("I see two items need attention. Let me check on your prescriptions first. Your discharge includes:");

  await wait(1000);
  addEl(
    '<div class="assess-label">POST-DISCHARGE MEDICATIONS</div>' +
    '<div class="assess-row"><span>&#128138;</span><span style="flex:1"><strong>Oxycodone 5mg</strong> &mdash; Every 6 hours as needed</span><span style="background:#fff3e0;color:#e67e22;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">NEW</span></div>' +
    '<div class="assess-row"><span>&#128138;</span><span style="flex:1"><strong>Aspirin 81mg</strong> &mdash; Daily, DVT prevention</span><span style="background:#fff3e0;color:#e67e22;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">NEW</span></div>' +
    '<div class="assess-row"><span>&#128138;</span><span style="flex:1"><strong>Lisinopril 20mg</strong> &mdash; Continue existing</span><span style="background:#e8f5e9;color:#27ae60;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">ONGOING</span></div>' +
    '<div class="assess-row"><span>&#128138;</span><span style="flex:1"><strong>Metoprolol 25mg</strong> &mdash; Continue existing</span><span style="background:#e8f5e9;color:#27ae60;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600">ONGOING</span></div>',
    'assess-card'
  );

  // 8. Bot asks about prescription pickup
  await wait(800);
  botMsg("Have you been able to pick up your new prescriptions?");

  // 9. USER CLICK: "Not yet, I can't drive"
  await actionBtn("Not yet, I can't drive");

  // 10. Bot offers delivery
  await typing(1500);
  botMsg("No problem &mdash; I can arrange delivery. Your Walgreens on Hawthorne offers free prescription delivery for post-surgical patients.");

  // 11. USER CLICK: "Yes, arrange delivery"
  await actionBtn("Yes, arrange delivery");

  // 12. Bot confirms delivery, offers to schedule follow-up
  await typing(1500);
  botMsg("Delivery confirmed for today by 3 PM. Now let's get your orthopedic follow-up scheduled. Your surgeon recommends a visit within 10&ndash;14 days.");

  // 13. Loading: searching provider directory
  var loader2 = addLoading('Searching provider directory ...');
  await wait(1500);
  loader2.remove();

  // Provider card 1: Dr. Michael Torres (patient's surgeon)
  var provCard1 = addEl(
    '<div class="provider-check-toggle selected">&#10003;</div>' +
    '<div class="provider-top">' +
    '<div class="provider-photo">MT</div>' +
    '<div class="provider-info">' +
    '<div class="provider-name">Dr. Michael Torres, MD</div>' +
    '<div class="provider-spec">Orthopedic Surgery &middot; Providence Orthopedics</div>' +
    '<div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="rating-num">4.9</span><span class="rating-count">(198)</span><span class="tier-badge">Tier 1 In-Network</span></div>' +
    '</div></div>' +
    '<div class="provider-meta"><span>Your surgeon</span><span>&#128176; $40 copay</span></div>',
    'provider-card'
  );
  await wait(300);

  // Provider card 2: Dr. Lisa Park
  var provCard2 = addEl(
    '<div class="provider-check-toggle selected">&#10003;</div>' +
    '<div class="provider-top">' +
    '<div class="provider-photo">LP</div>' +
    '<div class="provider-info">' +
    '<div class="provider-name">Dr. Lisa Park, MD</div>' +
    '<div class="provider-spec">Orthopedic Surgery &middot; OHSU Orthopedics</div>' +
    '<div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="rating-num">4.7</span><span class="rating-count">(142)</span><span class="tier-badge">Tier 1 In-Network</span></div>' +
    '</div></div>' +
    '<div class="provider-meta"><span>&#128205; 4.2 miles</span><span>&#128176; $40 copay</span></div>',
    'provider-card'
  );
  await wait(200);

  // Toggle checkmarks on click
  [provCard1, provCard2].forEach(function(card) {
    var toggle = card.querySelector('.provider-check-toggle');
    toggle.addEventListener('click', function() {
      toggle.classList.toggle('selected');
      toggle.innerHTML = toggle.classList.contains('selected') ? '&#10003;' : '';
    });
  });

  await actionBtn("Find available appointments");
  await wait(400);

  // Day/time picker
  await typing(1000);
  botMsg("What days and times work best for you?");
  await wait(400);

  var schedCard = addEl(
    '<div class="schedule-label">DAYS</div>' +
    '<div class="day-chips">' +
    '<span class="day-chip" data-day>Mon</span><span class="day-chip selected" data-day>Tue</span><span class="day-chip selected" data-day>Wed</span><span class="day-chip selected" data-day>Thu</span><span class="day-chip" data-day>Fri</span><span class="day-chip" data-day>Sat</span><span class="day-chip" data-day>Sun</span>' +
    '</div>' +
    '<div class="schedule-label">TIME OF DAY</div>' +
    '<div class="time-chips">' +
    '<span class="time-chip selected" data-time>Morning</span><span class="time-chip" data-time>Afternoon</span><span class="time-chip" data-time>Evening</span>' +
    '</div>' +
    '<button class="find-times-btn" id="findTimesBtn">Find Available Times &rarr;</button>',
    'schedule-card'
  );
  schedCard.querySelectorAll('[data-day]').forEach(function(d) { d.addEventListener('click', function() { d.classList.toggle('selected'); }); });
  schedCard.querySelectorAll('[data-time]').forEach(function(t) { t.addEventListener('click', function() { schedCard.querySelectorAll('[data-time]').forEach(function(x) { x.classList.remove('selected'); }); t.classList.add('selected'); }); });
  await new Promise(function(resolve) { document.getElementById('findTimesBtn').addEventListener('click', resolve); });
  schedCard.style.pointerEvents = 'none'; schedCard.style.opacity = '0.85';

  // Async calling
  await typing(1200);
  botMsg("Perfect. Let me call their offices to check availability. I\u2019ll text you in about 10\u201315 minutes once I have some options for you.");

  await actionBtn("I'll wait for the message");
  await wait(400);

  // Time skip
  addEl('Today 11:48 AM', 'timestamp');
  await wait(400);

  // Bot returns with results
  await typing(1200);
  botMsg("I heard back from the offices. Here\u2019s what\u2019s available this week. Go ahead and pick a time that works for you.");
  await wait(400);

  // Per-provider availability cards
  const slotCard1 = addEl(`
    <div class="provider-top">
      <div class="provider-photo">MT</div>
      <div class="provider-info">
        <div class="provider-name">Dr. Michael Torres</div>
        <div class="provider-spec">Orthopedic Surgery &middot; Your surgeon</div>
        <div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="rating-num">4.9</span><span class="rating-count">(198)</span><span class="tier-badge">Tier 1 In-Network</span></div>
      </div>
    </div>
    <div class="slots">
      <span class="slot" data-slot>Apr 8 &middot; 9:00 AM</span>
      <span class="slot" data-slot>Apr 9 &middot; 1:30 PM</span>
      <span class="slot" data-slot>Apr 10 &middot; 11:00 AM</span>
    </div>
  `, 'provider-card');
  slotCard1.style.opacity='1';slotCard1.style.transform='translateY(0)';
  await wait(300);

  const slotCard2 = addEl(`
    <div class="provider-top">
      <div class="provider-photo" style="background:linear-gradient(135deg,#2d6b7a,#4a9aab)">LP</div>
      <div class="provider-info">
        <div class="provider-name">Dr. Lisa Park</div>
        <div class="provider-spec">Orthopedic Surgery &middot; OHSU &middot; 4.2 mi</div>
        <div class="provider-rating"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9734;</span><span class="rating-num">4.7</span><span class="rating-count">(156)</span><span class="tier-badge">Tier 1 In-Network</span></div>
      </div>
    </div>
    <div class="slots">
      <span class="slot" data-slot>Apr 8 &middot; 2:00 PM</span>
      <span class="slot" data-slot>Apr 9 &middot; 10:30 AM</span>
      <span class="slot" data-slot>Apr 11 &middot; 9:00 AM</span>
    </div>
  `, 'provider-card');
  slotCard2.style.opacity='1';slotCard2.style.transform='translateY(0)';
  await wait(400);

  // Slot selection across both providers
  const allSlots = chat.querySelectorAll('[data-slot]');
  const chosenSlot = await new Promise(resolve => {
    allSlots.forEach(s => {
      s.style.cursor = 'pointer';
      s.addEventListener('click', () => {
        allSlots.forEach(x => x.classList.remove('selected'));
        s.classList.add('selected');
        resolve(s.textContent);
      });
    });
  });
  [slotCard1, slotCard2].forEach(c => c.style.pointerEvents = 'none');
  await wait(300);

  await actionBtn("Request this appointment");
  await wait(400);

  // Async confirmation
  await typing(1200);
  botMsg("Perfect, I\u2019ll call the office and book the appointment and send you a text when it\u2019s confirmed.");

  // 17. Bot asks about pain level
  await typing(1500);
  botMsg("Perfect. I also want to check &mdash; how is your pain level right now?");

  // 18. Pain card (display only, level 6)
  await wait(800);
  addEl(
    '<div class="pain-header">PAIN LEVEL</div>' +
    '<div class="pain-row"><span class="pain-badge">Moderate</span><span class="pain-num">6</span></div>' +
    '<div class="pain-dots">' +
    '<div class="dot active"></div><div class="dot active"></div><div class="dot active"></div>' +
    '<div class="dot active"></div><div class="dot active"></div><div class="dot current"></div>' +
    '<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>' +
    '</div>',
    'pain-card'
  );

  // 19. Bot pain management advice
  await wait(800);
  botMsg("That's within expected range for day 2. Remember to take your Oxycodone on schedule and use ice for 20 minutes every 2 hours.");

  // 20. Confirmation card with 4 items tracked
  await typing(1500);
  botMsg("Here's your complete post-discharge care plan:");

  await wait(800);
  addEl(
    '<div class="assess-label">POST-DISCHARGE CARE PLAN</div>' +
    '<div class="assess-title">4 Items Tracked</div>' +
    '<div class="assess-row"><span class="assess-check">&#10003;</span><span style="flex:1"><strong>Rx Delivery</strong></span><span style="font-size:12px;color:#5a6b7b">Today by 3 PM</span></div>' +
    '<div class="assess-row"><span class="assess-check">&#10003;</span><span style="flex:1"><strong>Surgeon Follow-up</strong></span><span style="font-size:12px;color:#5a6b7b">' + chosenSlot + '</span></div>' +
    '<div class="assess-row"><span class="assess-check">&#10003;</span><span style="flex:1"><strong>Physical Therapy</strong></span><span style="font-size:12px;color:#5a6b7b">Starts Apr 7 (referral sent)</span></div>' +
    '<div class="assess-row"><span class="assess-check">&#10003;</span><span style="flex:1"><strong>Daily Check-ins</strong></span><span style="font-size:12px;color:#5a6b7b">Automated for 30 days</span></div>',
    'assess-card'
  );

  // 21. Safety card
  await wait(800);
  addEl(
    '<h5>Contact your care team or call 911 if:</h5>' +
    '<div class="safety-item">&#9888; Fever above 101.5&deg;F</div>' +
    '<div class="safety-item">&#9888; Increased redness, swelling, or drainage at incision</div>' +
    '<div class="safety-item">&#9888; Sudden chest pain or difficulty breathing</div>' +
    '<div class="safety-item">&#9888; Calf pain or swelling (possible DVT)</div>',
    'safety-card'
  );

  // 22. Bot closing message about 30-day check-ins
  await wait(800);
  botMsg("I'll check in with you every day for the next 30 days. Your nurse care manager Sarah is also available if you need to speak with someone. Stay safe, Robert! &#128154;");
}

function startDemo() {
  document.getElementById('startOverlay').classList.add('hidden');
  runDemo();
}
</script>
