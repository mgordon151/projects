<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pager — Nurse Triage 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#e8eef5,#f5f7fb,#ebf0f9);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* iPhone Frame */
.phone{width:390px;height:844px;background:#fff;border-radius:50px;box-shadow:0 24px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.04);overflow:hidden;display:flex;flex-direction:column;position:relative}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:34px;background:#000;border-radius:0 0 20px 20px;z-index:50}
.status-bar{height:54px;background:#1a3a4a;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;z-index:40;flex-shrink:0}
.status-bar .time{color:white;font-size:15px;font-weight:600}
.status-bar .icons{display:flex;gap:4px;align-items:center;color:white;font-size:12px}
.status-bar .icons span{font-weight:600}

/* Header */
.chat-header{background:#1a3a4a;padding:10px 20px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-header .back{color:white;font-size:22px;font-weight:300;cursor:pointer;line-height:1}
.chat-header h1{color:white;font-size:17px;font-weight:600;flex:1;text-align:center;margin-right:22px}

/* Chat Area */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff}
.chat-body::-webkit-scrollbar{width:0}

/* Timestamp */
.timestamp{text-align:center;font-size:11px;color:#8a9baa;padding:4px 0}

/* Messages */
.msg{display:flex;gap:8px;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:white;font-family:Georgia,serif}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;max-width:100%}
.msg.bot .bub{background:#f0f2f5;color:#1a2332;border-bottom-left-radius:4px}
.msg.user .bub{background:#1a3a4a;color:white;border-bottom-right-radius:4px}

/* Typing */
.typing{display:flex;gap:8px;align-self:flex-start;opacity:0;animation:msgIn .35s ease forwards}
.typing .dots{display:flex;gap:4px;padding:12px 16px;background:#f0f2f5;border-radius:18px;border-bottom-left-radius:4px}
.typing .dots span{width:6px;height:6px;background:#8a9baa;border-radius:50%;animation:bounce 1.2s infinite}
.typing .dots span:nth-child(2){animation-delay:.15s}
.typing .dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Suggested Actions */
.actions{display:flex;flex-direction:column;gap:8px;align-self:flex-end;max-width:88%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.action-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#1a3a4a;color:white;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;align-self:flex-end}
.action-btn .icon{font-size:12px;opacity:0.7}

/* GenUI Cards */
.card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);max-width:100%;align-self:flex-start}
.card-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;padding:14px 16px 0}

/* Pain Level Card */
.pain-card{background:#1a3a4a;border-radius:16px;padding:16px;color:white;margin:4px 0;align-self:flex-end;max-width:70%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.pain-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:rgba(255,255,255,0.6);margin-bottom:8px}
.pain-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pain-badge{background:#e67e22;color:white;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.pain-num{font-size:36px;font-weight:700}
.pain-dots{display:flex;gap:4px}
.pain-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2)}
.pain-dots .dot.active{background:#e67e22}
.pain-dots .dot.current{background:#e67e22;box-shadow:0 0 6px rgba(230,126,34,0.5)}

/* Symptom Chips */
.symptom-card{background:#1a3a4a;border-radius:16px;padding:14px 16px;align-self:flex-end;max-width:75%;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px)}
.symptom-card .card-label{color:rgba(255,255,255,0.6);padding:0 0 8px}
.symptom-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)}
.chip.selected{background:white;color:#1a3a4a;font-weight:600}

/* Assessment Card */
.assess-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.assess-label{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.assess-title{font-size:16px;font-weight:700;color:#1a2332;margin-bottom:6px}
.assess-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#fff3e0;color:#e67e22;margin-bottom:12px}
.assess-section{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 8px}
.assess-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:#1a2332}
.assess-check{width:20px;height:20px;border-radius:50%;background:#27ae60;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;flex-shrink:0}
.calc-time{text-align:center;font-size:11px;color:#8a9baa;margin-top:8px}

/* Provider Card */
.provider-card{background:white;border:2px solid #e8ecf0;border-radius:16px;padding:14px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%;position:relative}
.provider-card.selected{border-color:#1a3a4a}
.provider-top{display:flex;gap:10px;align-items:flex-start}
.provider-photo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a3a4a,#2d6b7a);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:600;flex-shrink:0}
.provider-info{flex:1}
.provider-name{font-size:15px;font-weight:700;color:#1a2332}
.provider-spec{font-size:12px;color:#5a6b7b;margin-top:1px}
.provider-rating{display:flex;align-items:center;gap:4px;margin-top:4px}
.stars{color:#e67e22;font-size:12px}
.rating-num{font-size:13px;font-weight:600;color:#1a2332}
.rating-count{font-size:11px;color:#8a9baa}
.tier-badge{font-size:11px;font-weight:600;color:#27ae60;margin-left:auto}
.provider-check{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;background:#1a3a4a;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
.provider-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.provider-meta span{font-size:11px;color:#5a6b7b}
.provider-desc{font-size:12px;color:#5a6b7b;margin-top:8px;line-height:1.4}

/* Filter Tabs */
.filter-tabs{display:flex;gap:8px;padding:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start}
.filter-tab{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;background:#f0f2f5;color:#5a6b7b;cursor:pointer}
.filter-tab.active{background:#1a3a4a;color:white}

/* Time Slots */
.slots{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.slot{padding:6px 12px;border-radius:12px;font-size:12px;font-weight:500;background:#f0f2f5;color:#5a6b7b}
.slot.selected{background:#1a3a4a;color:white}

/* Nurse Card */
.nurse-card{border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.nurse-header{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:16px;display:flex;align-items:center;gap:12px}
.nurse-photo{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,0.5)}
.nurse-name{color:white;font-size:16px;font-weight:700}
.nurse-org{display:inline-block;background:rgba(255,255,255,0.25);color:white;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500;margin-top:2px}
.nurse-body{background:white;border:1px solid #e8ecf0;border-top:none;padding:14px 16px;font-size:13px;color:#3a4a5a;line-height:1.5}
.nurse-creds{margin-top:8px;font-size:13px}
.nurse-creds span{display:flex;align-items:center;gap:6px;padding:2px 0}

/* Cost Card */
.cost-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eef2f5;font-size:13px}
.cost-row:last-child{border-bottom:none}
.cost-label{color:#5a6b7b}
.cost-val{font-weight:600;color:#1a2332}

/* Safety Card */
.safety-card{background:#fff8f0;border:1px solid #fde0b0;border-radius:16px;padding:14px 16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.safety-card h5{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:8px}
.safety-item{font-size:12px;color:#5a3a1a;padding:3px 0}

/* Input Bar */
.input-bar{padding:10px 16px 28px;background:#fff;border-top:1px solid #f0f2f5;display:flex;align-items:center;gap:8px;flex-shrink:0}
.input-field{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #e0e4e8;font-size:14px;color:#8a9baa;background:#f8f9fb;font-family:'Inter',sans-serif}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a3a4a;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn svg{width:16px;height:16px;fill:white}

/* Start Overlay */
.start-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:flex;align-items:center;justify-content:center;z-index:60;border-radius:50px}
.start-overlay.hidden{display:none}
.start-content{text-align:center;padding:40px}
.start-content h2{font-size:22px;color:#1a2332;margin-bottom:6px;font-weight:700}
.start-content p{font-size:13px;color:#5a6b7b;margin-bottom:20px;line-height:1.5}
.start-btn{padding:14px 36px;background:#1a3a4a;color:white;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .2s}
.start-btn:hover{transform:scale(1.04)}

/* UC label */
.uc-badge{display:inline-block;background:#1a3a4a;color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:10px;margin-bottom:10px;letter-spacing:0.5px}

/* ===== UC6-specific additions ===== */

/* Acuity Card */
.acuity-card{background:#f8f9fb;border:1px solid #e8ecf0;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.acuity-meter{display:flex;gap:4px;margin:10px 0}
.acuity-seg{flex:1;height:8px;border-radius:4px;background:#e8ecf0}
.acuity-seg.low{background:#27ae60}
.acuity-seg.med{background:#e67e22}
.acuity-seg.high{background:#c0392b}
.acuity-seg.active{box-shadow:0 0 6px rgba(0,0,0,0.2)}

/* Handoff Card */
.handoff-card{border-radius:16px;overflow:hidden;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.handoff-header{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:14px 16px;display:flex;align-items:center;gap:10px}
.handoff-photo{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,0.5)}
.handoff-info{color:white}
.handoff-name{font-size:15px;font-weight:700}
.handoff-role{font-size:11px;opacity:0.8}
.handoff-body{background:white;border:1px solid #e8ecf0;border-top:none;padding:14px 16px}
.handoff-section{font-size:10px;font-weight:700;color:#8a9baa;text-transform:uppercase;letter-spacing:0.8px;margin:8px 0 6px}
.handoff-section:first-child{margin-top:0}
.handoff-item{font-size:12px;color:#3a4a5a;padding:2px 0;display:flex;align-items:center;gap:6px}

/* Self Care Card */
.selfcare-card{background:#e8f8f0;border:1px solid #b8e6cc;border-radius:16px;padding:16px;margin:4px 0;animation:msgIn .35s ease forwards;opacity:0;transform:translateY(8px);align-self:flex-start;max-width:88%}
.selfcare-title{font-size:14px;font-weight:700;color:#1a6b42;margin-bottom:10px}
.selfcare-item{font-size:13px;color:#2a5a3a;padding:4px 0;display:flex;align-items:flex-start;gap:8px}
.selfcare-icon{flex-shrink:0;font-size:14px}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="time">11:45</span>
    <span class="icons"><span>5G</span> <span>&#9679;</span></span>
  </div>
  <div class="chat-header">
    <span class="back">&#8249;</span>
    <h1>Your Regence Companion</h1>
  </div>
  <div class="chat-body" id="chat"></div>
  <div class="input-bar">
    <input class="input-field" placeholder="Type a message..." readonly>
    <button class="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <div class="uc-badge">USE CASE 6</div>
      <h2>Nurse Triage 2.0</h2>
      <p>AI-powered clinical intake with smart nurse handoff — 24/7 symptom assessment, acuity scoring, and seamless context transfer.</p>
      <button class="start-btn" onclick="startDemo()">Start Demo</button>
    </div>
  </div>
</div>

<script>
const chat=document.getElementById('chat');
let si=0;

function sb(){chat.scrollTop=chat.scrollHeight}

function addEl(html,cls=''){
  const d=document.createElement('div');
  if(cls)d.className=cls;
  d.innerHTML=html;
  chat.appendChild(d);
  sb();
  return d;
}

function addTyping(){
  const d=document.createElement('div');d.className='typing';d.id='typing';
  d.innerHTML=`<div class="avatar">R</div><div class="dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(d);sb();
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove()}

function botMsg(text){
  removeTyping();
  addEl(`<div class="avatar">R</div><div class="bub">${text}</div>`,'msg bot');
}
function userMsg(text){
  addEl(`<div class="bub">${text}</div>`,'msg user');
}
function actionBtn(text){
  addEl(`<div class="action-btn"><span class="icon">&#8618;</span>${text}</div>`,'actions');
}

const steps=[
// 1. Timestamp
{delay:500,action:()=>{addEl('Today 11:45 PM','timestamp')}},

// 2. User message
{delay:800,action:()=>{userMsg("My 4-year-old has had a fever of 102.5 for the past few hours and he's really fussy. Should I take him to the ER?")}},

// 3. Typing then bot
{delay:1200,action:()=>addTyping()},
{delay:2800,action:()=>{botMsg("I understand your concern — a fever in a young child can be scary. Let me ask a few important questions to help determine the best next step.")}},

// 4. Bot asks about symptoms
{delay:1500,action:()=>{botMsg("First, besides the fever, is Tyler experiencing any of these symptoms?")}},

// 5. Symptom chips
{delay:1200,action:()=>{
  addEl(`
    <div class="card-label" style="color:rgba(255,255,255,0.6);padding:0 0 8px">SYMPTOMS REPORTED</div>
    <div class="symptom-chips">
      <span class="chip">Rash</span>
      <span class="chip selected">Vomiting</span>
      <span class="chip">Difficulty breathing</span>
      <span class="chip">Stiff neck</span>
      <span class="chip selected">Ear pain</span>
      <span class="chip selected">Cough</span>
      <span class="chip">Diarrhea</span>
      <span class="chip">Lethargy</span>
    </div>
  `,'symptom-card');
}},

// 6. Bot asks about duration and fluids
{delay:1500,action:()=>{botMsg("How long has he had the fever? And has he been able to keep fluids down?")}},

// 7. User responds
{delay:1500,action:()=>{userMsg("About 5 hours. He vomited once but has been drinking a little water since.")}},

// 8. Typing then bot asks vaccinations
{delay:1200,action:()=>addTyping()},
{delay:2800,action:()=>{botMsg("Thank you. Let me also check — is Tyler up to date on his vaccinations, and has he been around anyone who's been sick recently?")}},

// 9. User responds
{delay:1500,action:()=>{userMsg("Yes, vaccinations are current. A few kids at daycare had a cold last week.")}},

// 10. Typing then assessment intro
{delay:1200,action:()=>addTyping()},
{delay:2800,action:()=>{botMsg("Based on what you've described, here's my assessment:")}},

// 11. Acuity Card
{delay:1200,action:()=>{
  addEl(`
    <div class="assess-label">TRIAGE ASSESSMENT</div>
    <div class="assess-title">Upper Respiratory Infection with Fever</div>
    <div class="acuity-meter">
      <div class="acuity-seg low"></div>
      <div class="acuity-seg low"></div>
      <div class="acuity-seg low"></div>
      <div class="acuity-seg med active"></div>
      <div class="acuity-seg high"></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:#e67e22;margin-bottom:12px">Moderate Acuity — Level 3</div>
    <div class="assess-section">KEY FINDINGS</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Fever 102.5&deg;F (within manageable range for age)</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Mild vomiting with fluid intake maintained</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Ear pain suggests possible otitis media</div>
    <div class="assess-row"><span class="assess-check">&#10003;</span>Daycare exposure consistent with viral URI</div>
  `,'acuity-card');
}},

// 12. Bot explains assessment
{delay:2000,action:()=>{botMsg("Tyler's symptoms suggest a viral upper respiratory infection, possibly with an ear infection. This doesn't require an ER visit tonight, but I'd recommend a pediatrician visit tomorrow. Given the ear pain, I want to connect you with a nurse to discuss this further.")}},

// 13. Bot announces handoff
{delay:2000,action:()=>{botMsg("Let me transfer you to Nurse Sarah — she specializes in pediatric care. I'll share everything we've discussed so you won't need to repeat anything.")}},

// 14. Handoff Card
{delay:1500,action:()=>{
  addEl(`
    <div class="handoff-header">
      <div class="handoff-photo">&#129681;</div>
      <div class="handoff-info">
        <div class="handoff-name">Sarah Chen, RN</div>
        <div class="handoff-role">Pediatric Triage Nurse &middot; Available now</div>
      </div>
    </div>
    <div class="handoff-body">
      <div class="handoff-section">CONTEXT TRANSFERRED</div>
      <div class="handoff-item">&#128203; 4yo male, fever 102.5&deg;F &times; 5hrs</div>
      <div class="handoff-item">&#128203; Vomiting &times;1, ear pain, cough</div>
      <div class="handoff-item">&#128203; Fluid intake maintained</div>
      <div class="handoff-item">&#128203; Daycare exposure, vaccines current</div>
      <div class="handoff-section">AI ASSESSMENT</div>
      <div class="handoff-item">&#129302; Moderate acuity — URI + possible otitis media</div>
    </div>
  `,'handoff-card');
}},

// 15. Nurse Sarah greeting
{delay:2000,action:()=>{botMsg("Hi Jennifer, this is Nurse Sarah. I've reviewed everything your health companion gathered. Tyler's symptoms are consistent with what we've been seeing from daycare this season.")}},

// 16. Nurse recommends
{delay:1800,action:()=>{botMsg("For tonight, here's what I recommend:")}},

// 17. Self-Care Card
{delay:1200,action:()=>{
  addEl(`
    <div class="selfcare-title">Tonight's Care Plan for Tyler</div>
    <div class="selfcare-item"><span class="selfcare-icon">&#127777;&#65039;</span>Children's Tylenol (acetaminophen) per package dosing for his weight</div>
    <div class="selfcare-item"><span class="selfcare-icon">&#128167;</span>Small frequent sips of water, Pedialyte, or diluted juice</div>
    <div class="selfcare-item"><span class="selfcare-icon">&#128705;</span>Lukewarm bath if fever rises above 103&deg;F</div>
    <div class="selfcare-item"><span class="selfcare-icon">&#128564;</span>Keep him comfortable — light clothing, cool room</div>
  `,'selfcare-card');
}},

// 18. Bot offers appointment
{delay:2000,action:()=>{botMsg("I'd also like to get him seen by his pediatrician tomorrow for the ear pain. Let me find available appointments:")}},

// 19. Provider Card — Dr. Amy Lin

function runStep(){
  if(si>=steps.length)return;
  const s=steps[si];si++;
  setTimeout(()=>{s.action();runStep()},s.delay);
}
function startDemo(){
  document.getElementById('startOverlay').classList.add('hidden');
  runStep();
}
